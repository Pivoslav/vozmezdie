    * { box-sizing: border-box; }

    .demo-header .badge { display: inline-block; margin-left: 0.5rem; padding: 0.2rem 0.5rem; font-size: 0.75rem; background: #8b0000; border-radius: 4px; font-family: 'JetBrains Mono', monospace; }
    .demo-header p { margin: 0.5rem 0 0; font-size: 0.9rem; opacity: 0.9; }
    #map { height: 70vh; min-height: 400px; }
    .demo-footer { padding: 1rem 1.5rem; font-size: 0.85rem; color: #6b7280; }
    .demo-footer a { color: #8b7355; }
    .leaflet-popup-content { margin: 0.5rem 0.75rem; font-family: 'Crimson Text', Georgia, serif; }
    .leaflet-popup-content strong { color: #8b0000; }
  </style>
</head>

      var minCount = Math.min.apply(null, counts);
      var maxCount = Math.max.apply(null, counts);

      function radiusForCount(c) {
        return 6 + Math.sqrt((c - minCount) / (maxCount - minCount || 1)) * 18;
      }

      var map = L.map('map').setView([48.5, 31.5], 6);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      }).addTo(map);

      places.forEach(function(p) {
        var r = radiusForCount(p.count);
        var circle = L.circleMarker([p.coords[0], p.coords[1]], {
          radius: r,
          fillColor: '#8b0000',
          color: '#4a5568',
          weight: 1.5,
          opacity: 0.9,
          fillOpacity: 0.6
        }).addTo(map);
        circle.bindPopup('<strong>' + (p.name || '') + '</strong><br/>' + p.count + ' segment(s)');
      });
